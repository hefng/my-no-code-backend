server:
  port: 8123
  servlet:
    context-path: /api
spring:
  servlet:
    multipart:
      # 最大文件上传体积 2MB
      max-file-size: 2MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/my_nocode_backend
    username: root
    password: root
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.hefng.mynocodebackend.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
